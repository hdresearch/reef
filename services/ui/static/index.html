<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>reef</title>
  <link rel="stylesheet" href="/ui/static/style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>▸ reef</h1>
      <nav id="tabs">
        <button class="tab active" data-view="feed">feed</button>
      </nav>
      <div class="spacer"></div>
      <div class="status" id="status">
        <span class="dot"></span>
        <span class="label">connecting</span>
      </div>
    </header>

    <div id="workspace">
      <aside id="conversations">
        <div id="conversations-header">
          <span>conversations</span>
          <button id="new-chat" type="button">new</button>
        </div>
        <div id="conversations-scroll">
          <section class="conversation-group">
            <div class="conversation-group-label">open</div>
            <div id="conversation-list-open" class="conversation-list"></div>
          </section>
          <section class="conversation-group">
            <div class="conversation-group-label">closed</div>
            <div id="conversation-list-closed" class="conversation-list"></div>
          </section>
        </div>
      </aside>

      <div id="branch">
        <div id="branch-header">
          <div>
            <div id="branch-label">select a conversation</div>
            <div id="branch-meta"></div>
          </div>
          <div id="branch-actions">
            <button id="branch-toggle" type="button" hidden>close</button>
            <button id="branch-close" type="button">✕</button>
          </div>
        </div>
        <div id="branch-scroll">
          <div id="branch-empty">Select a conversation to continue the chat, or start a new one from the left sidebar.</div>
          <div id="branch-messages"></div>
        </div>
        <div id="branch-attachments"></div>
        <div id="branch-input">
          <input type="file" id="branch-file" multiple hidden />
          <button id="branch-attach" type="button" title="Attach files">📎</button>
          <textarea id="branch-text" placeholder="Start a new conversation…" rows="1"></textarea>
          <button id="branch-send">↵</button>
        </div>
      </div>

      <!-- Mobile "More" view (hidden on desktop, shown via JS) -->
      <div id="mobile-more-view"></div>

      <!-- Feed: activity scoped to the selected conversation when possible -->
      <aside id="feed">
        <div id="feed-header">
          <div>
            <div id="feed-label">activity</div>
            <div id="feed-scope">global reef activity</div>
          </div>
        </div>
        <div id="feed-scroll">
          <div id="feed-entries"></div>
        </div>
      </aside>
    </div>

    <!-- Panel views (discovered dynamically, toggled via tabs) -->
    <div id="panel-area" class="closed"></div>

    <!-- Mobile bottom nav (hidden on desktop via CSS) -->
    <nav id="mobile-nav">
      <button class="mobile-tab active" data-mobile-view="chats">💬<span>Chats</span></button>
      <button class="mobile-tab" data-mobile-view="chat">📝<span>Chat</span></button>
      <button class="mobile-tab" data-mobile-view="feed">📊<span>Feed</span></button>
      <button class="mobile-tab" data-mobile-view="more">⚙<span>More</span></button>
    </nav>
  </div>

  <script>const PANEL_API = '/ui/api';</script>
  <script src="/ui/static/qrcode.js"></script>
  <script src="/ui/static/app.js"></script>
</body>
</html>
