<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>reef</title>
  <link rel="stylesheet" href="/ui/static/style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>▸ reef</h1>
      <nav id="tabs">
        <button class="tab active" data-view="feed">feed</button>
      </nav>
      <div class="spacer"></div>
      <div class="status" id="status">
        <span class="dot"></span>
        <span class="label">connecting</span>
      </div>
    </header>

    <div id="workspace">
      <!-- Feed: the main trunk -->
      <div id="feed">
        <div id="feed-scroll">
          <div id="feed-entries"></div>
        </div>
        <div id="feed-input">
          <textarea id="input" placeholder="Start a conversation… (Enter to send)" rows="1"></textarea>
          <button id="send">↵</button>
        </div>
      </div>

      <!-- Branch chat panel (hidden until opened) -->
      <div id="branch" class="closed">
        <div id="branch-header">
          <span id="branch-label">conversation</span>
          <button id="branch-close">✕</button>
        </div>
        <div id="branch-scroll">
          <div id="branch-messages"></div>
        </div>
        <div id="branch-input">
          <textarea id="branch-text" placeholder="Continue the conversation…" rows="1"></textarea>
          <button id="branch-send">↵</button>
        </div>
      </div>
    </div>

    <!-- Panel views (discovered dynamically, toggled via tabs) -->
    <div id="panel-area" class="closed"></div>
  </div>

  <script>const PANEL_API = '/ui/api';</script>
  <script src="/ui/static/app.js"></script>
</body>
</html>
